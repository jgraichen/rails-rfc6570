name: test

on:
  - push
  - pull_request

jobs:
  rspec:
    name: Ruby ${{ matrix.ruby }} / ${{ matrix.gemfile }}
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        ruby:
          - "3.4"
          - "3.3"
          - "3.2"
          - "3.1"
          - "3.0"
          - "2.7"
        gemfile:
          - rails_6.1
          - rails_7.0
          - rails_7.1
          - rails_7.2
          - rails_8.0
          - rails_8.1
        exclude:
          - gemfile: rails_8.1
            ruby: "3.1"
          - gemfile: rails_8.1
            ruby: "3.0"
          - gemfile: rails_8.1
            ruby: "2.7"
          - gemfile: rails_8.0
            ruby: "3.1"
          - gemfile: rails_8.0
            ruby: "3.0"
          - gemfile: rails_8.0
            ruby: "2.7"
          - gemfile: rails_7.2
            ruby: "3.0"
          - gemfile: rails_7.2
            ruby: "2.7"
          - gemfile: rails_7.1
            ruby: "3.4"
          - gemfile: rails_7.0
            ruby: "3.4"
          - gemfile: rails_6.1
            ruby: "3.4"
      fail-fast: False

    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/${{ matrix.gemfile }}.gemfile
      BUNDLE_JOBS: 4
      BUNDLE_RETRY: 10
      BUNDLE_WITHOUT: development

    steps:
      - uses: actions/checkout@61b9e3751b92087fd0b06925ba6dd6314e06f089 # master

      - name: Install dependencies
        run: |
          sudo apt-get install --quiet --yes libsqlite3-dev

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - run: |
          bundle exec rspec --force-color --format documentation

      - uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  rubocop:
    name: rubocop
    runs-on: ubuntu-24.04

    env:
      BUNDLE_JOBS: 4
      BUNDLE_RETRY: 10
      BUNDLE_WITHOUT: test

    steps:
      - uses: actions/checkout@61b9e3751b92087fd0b06925ba6dd6314e06f089 # master
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.4"
          bundler-cache: True

      - run: bundle exec rubocop --parallel --color
